<!DOCTYPE html>
<html>
<head>
<title>Student Profile</title>

<style>

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#4facfe,#00f2fe);
    margin:0;
    padding:0;
}

.container{
    width:420px;
    margin:60px auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    text-align:center;
}

.header{
    background:#4facfe;
    color:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
}

.header h2{
    margin:0;
}

.college{
    font-size:14px;
    opacity:0.9;
}

.profile-icon{
    font-size:70px;
    margin:10px 0 20px 0;
}

table{
    width:100%;
    border-collapse:collapse;
}

td{
    padding:12px;
    text-align:left;
}

.label{
    font-weight:bold;
    color:#333;
}

.value{
    color:#555;
}

tr{
    border-bottom:1px solid #eee;
}

tr:hover{
    background:#f7f7f7;
}

</style>

</head>

<body>

<div class="container">

<div class="header">
<h2>Student Profile</h2>
<div class="college">Jain University</div>
</div>

<div class="profile-icon">👨‍🎓</div>

<table>

<tr>
<td class="label">Name</td>
<td class="value">Yashas Naik</td>
</tr>

<tr>
<td class="label">USN</td>
<td class="value">24BTRCN049</td>
</tr>

<tr>
<td class="label">Course</td>
<td class="value">BTECH</td>
</tr>

<tr>
<td class="label">Branch</td>
<td class="value">Computer Science</td>
</tr>

<tr>
<td class="label">Semester</td>
<td class="value">4</td>
</tr>

<tr>
<td class="label">Email</td>
<td class="value">yashasnaik@gmail.com</td>
</tr>

<tr>
<td class="label">Phone</td>
<td class="value">9019223436</td>
</tr>

</table>

</div>

</body>
</html>
